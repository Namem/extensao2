version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ceres_db
      POSTGRES_USER: ceres_user
      POSTGRES_PASSWORD: ceres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: